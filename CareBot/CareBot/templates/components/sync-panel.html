<!-- Offline Sync Control Panel -->
<div class="panel panel-info">
    <div class="panel-heading">
        <h4 class="panel-title">
            <span class="glyphicon glyphicon-cloud"></span> Синхронизация Офлайн Данных
        </h4>
    </div>
    <div class="panel-body">
        <div class="row">
            <!-- Cache Status -->
            <div class="col-md-4">
                <div class="well well-sm">
                    <h5>📦 Локальный Кеш</h5>
                    <p id="cache-status">Проверка статуса кеша...</p>
                    <div>
                        <button class="btn btn-sm btn-primary" onclick="CareBotSync.downloadAndCache()">
                            <span class="glyphicon glyphicon-download"></span> Обновить Кеш
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="CareBotSync.clearAllCache()">
                            <span class="glyphicon glyphicon-trash"></span> Очистить
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Sync Status -->
            <div class="col-md-4">
                <div class="well well-sm">
                    <h5>🔄 Статус Синхронизации</h5>
                    <p id="sync-status">Проверка статуса синхронизации...</p>
                    <div>
                        <button class="btn btn-sm btn-success" onclick="CareBotSync.syncPendingChanges()">
                            <span class="glyphicon glyphicon-refresh"></span> Синхронизировать
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Pending Battles -->
            <div class="col-md-4">
                <div class="well well-sm">
                    <h5>⚔️ Ожидающиеся Результаты</h5>
                    <p id="pending-status">Загрузка...</p>
                    <div>
                        <button class="btn btn-sm btn-info" onclick="CareBotSync.showPendingBattles()">
                            <span class="glyphicon glyphicon-list"></span> Просмотреть
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Debug Info (collapsible) -->
        <div style="margin-top: 15px;">
            <button class="btn btn-xs btn-default" data-toggle="collapse" data-target="#sync-debug">
                <span class="glyphicon glyphicon-option-vertical"></span> Отладочная Информация
            </button>
            <div id="sync-debug" class="collapse" style="margin-top: 10px;">
                <pre id="debug-output" style="background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 300px; overflow: auto;"></pre>
            </div>
        </div>
    </div>
</div>

<style>
    #cache-status, #sync-status, #pending-status {
        color: #666;
        font-size: 12px;
        min-height: 40px;
        padding: 5px 0;
    }
    
    #pending-battles-modal {
        max-height: 600px;
        overflow-y: auto;
    }
    
    .battle-item {
        padding: 10px;
        margin: 5px 0;
        background: #f9f9f9;
        border-left: 4px solid #007bff;
        border-radius: 3px;
    }
    
    .sync-log {
        font-family: monospace;
        font-size: 11px;
        line-height: 1.4;
    }
</style>

<script>
// Extend CareBotSync with UI methods
Object.assign(CareBotSync, {
    /**
     * Update cache status display
     */
    async updateCacheStatus() {
        try {
            const missions = await this.getCachedMissions();
            const edges = await this.getCachedData('map_edges');
            
            const html = `
                <span class="glyphicon glyphicon-ok text-success"></span>
                <strong>Кеш актуален</strong><br/>
                Миссии: <strong>${missions.length}</strong><br/>
                Территории: <strong>${(edges?.length || 0)}</strong>
            `;
            document.getElementById('cache-status').innerHTML = html;
        } catch (error) {
            document.getElementById('cache-status').innerHTML = `
                <span class="glyphicon glyphicon-remove text-danger"></span> Ошибка: ${error.message}
            `;
        }
    },
    
    /**
     * Update sync status display
     */
    async updateSyncStatus() {
        try {
            const status = await this.getSyncStatus();
            if (!status) {
                document.getElementById('sync-status').innerHTML = 'Ошибка подключения';
                return;
            }
            
            const html = `
                <strong>${status.pending_missions || 0}</strong> ожидающихся<br/>
                <strong>${status.completed_missions || 0}</strong> завершённых<br/>
                Последний синк: ${status.last_sync_time || 'Никогда'}
            `;
            document.getElementById('sync-status').innerHTML = html;
        } catch (error) {
            document.getElementById('sync-status').innerHTML = `Ошибка: ${error.message}`;
        }
    },
    
    /**
     * Update pending battles display
     */
    async updatePendingStatus() {
        if (typeof window.Android === 'undefined') {
            document.getElementById('pending-status').innerHTML = 'Android bridge недоступен';
            return;
        }
        
        try {
            const pending = JSON.parse(window.Android.getPendingBattles());
            const html = `
                <strong>${pending.pending || 0}</strong> ожидающихся результатов
            `;
            document.getElementById('pending-status').innerHTML = html;
        } catch (error) {
            document.getElementById('pending-status').innerHTML = `Ошибка: ${error.message}`;
        }
    },
    
    /**
     * Show pending battles in modal
     */
    async showPendingBattles() {
        if (typeof window.Android === 'undefined') {
            alert('Android bridge недоступен');
            return;
        }
        
        try {
            const pending = JSON.parse(window.Android.getPendingBattles());
            
            if (!pending.battles || pending.battles.length === 0) {
                alert('Нет ожидающихся результатов');
                return;
            }
            
            let html = '<div class="battle-item">';
            pending.battles.forEach((battle, idx) => {
                html += `
                    <div class="battle-item">
                        <strong>Результат ${idx + 1}</strong><br/>
                        Миссия: ${battle.mission_type} (ID: ${battle.mission_id})<br/>
                        Победитель: ${battle.winner_id} vs Проигравший: ${battle.loser_id}<br/>
                        Местоположение: ${battle.location}<br/>
                        <small style="color: #999;">${new Date(battle.timestamp).toLocaleString('ru-RU')}</small>
                    </div>
                `;
            });
            html += '</div>';
            
            // Create modal
            if (document.getElementById('battles-modal')) {
                document.getElementById('battles-modal').remove();
            }
            
            const modal = document.createElement('div');
            modal.id = 'battles-modal';
            modal.className = 'modal fade';
            modal.innerHTML = `
                <div class="modal-dialog" style="width: 90%; max-width: 600px;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal">&times;</button>
                            <h4 class="modal-title">⚔️ Ожидающиеся Результаты</h4>
                        </div>
                        <div class="modal-body" id="pending-battles-modal">
                            ${html}
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-default" data-dismiss="modal">Закрыть</button>
                            <button type="button" class="btn btn-primary" onclick="CareBotSync.syncPendingChanges(); $('#battles-modal').modal('hide');">
                                Синхронизировать
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            jQuery('#battles-modal').modal('show');
        } catch (error) {
            console.error('Error showing battles:', error);
            alert(`Ошибка: ${error.message}`);
        }
    },
    
    /**
     * Refresh all UI elements
     */
    async refreshUI() {
        await this.updateCacheStatus();
        await this.updateSyncStatus();
        await this.updatePendingStatus();
    }
});

// Initialize UI on load
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => CareBotSync.refreshUI(), 1000);
    
    // Refresh every 30 seconds
    setInterval(() => CareBotSync.refreshUI(), 30000);
});
</script>
